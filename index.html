<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TENTIAL PoTENTIAL1000 ポートフォリオ シミュレーター</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f0f4f8; color: #1a202c; }
.header { background: #1e3a5f; color: white; padding: 20px 24px; display: flex; justify-content: space-between; align-items: center; }
.header h1 { font-size: 20px; font-weight: 700; }
.header p { font-size: 13px; opacity: 0.7; margin-top: 4px; }
.copy-url-btn { background: #fff; color: #1e3a5f; border: none; border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; }
.copy-url-btn:hover { background: #e2e8f0; }
.save-indicator { font-size: 12px; color: #90cdf4; margin-top: 4px; text-align: right; }
.global-settings { background: white; padding: 16px 24px; border-bottom: 1px solid #e2e8f0; display: flex; gap: 24px; align-items: center; flex-wrap: wrap; }
.global-settings label { font-size: 13px; color: #4a5568; }
.global-settings select, .global-settings input { border: 1px solid #cbd5e0; border-radius: 6px; padding: 4px 8px; font-size: 13px; }
.tabs { display: flex; background: white; border-bottom: 2px solid #e2e8f0; padding: 0 24px; }
.tab { padding: 12px 20px; cursor: pointer; font-size: 14px; color: #718096; border-bottom: 2px solid transparent; margin-bottom: -2px; }
.tab.active { color: #1e3a5f; border-bottom-color: #1e3a5f; font-weight: 600; }
.content { padding: 20px 24px; max-width: 1200px; margin: 0 auto; }
.section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.section-title { font-size: 16px; font-weight: 700; color: #1e3a5f; }
.btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; }
.btn-primary { background: #1e3a5f; color: white; }
.btn-secondary { background: #e2e8f0; color: #4a5568; }
.btn-small { padding: 4px 10px; font-size: 12px; }
.card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); border-left: 4px solid #ccc; cursor: grab; }
.card:active { cursor: grabbing; }
.card.dragging { opacity: 0.5; }
.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.card-title input { font-size: 15px; font-weight: 700; border: none; border-bottom: 1px dashed #cbd5e0; outline: none; width: 200px; background: transparent; }
.card-badges { display: flex; gap: 6px; align-items: center; }
.badge { padding: 3px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
.badge-existing { background: #e6f0ff; color: #1e3a5f; }
.badge-new { background: #fff3e0; color: #e65100; }
.badge-child { background: #f0fff4; color: #276749; }
.toggle-mode { font-size: 11px; color: #718096; cursor: pointer; text-decoration: underline; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
.field { margin-bottom: 10px; }
.field label { font-size: 11px; color: #718096; display: block; margin-bottom: 3px; }
.field input, .field select { width: 100%; border: 1px solid #e2e8f0; border-radius: 6px; padding: 6px 10px; font-size: 13px; }
.field input:focus { outline: none; border-color: #1e3a5f; }
.field input[readonly] { background: #f7fafc; color: #718096; }
.slider-row { display: flex; align-items: center; gap: 8px; }
.slider-row input[type=range] { flex: 1; }
.preview-box { background: #f7fafc; border-radius: 8px; padding: 10px 12px; margin-top: 10px; }
.preview-title { font-size: 11px; color: #718096; margin-bottom: 6px; font-weight: 600; }
.preview-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.preview-label { font-size: 12px; color: #4a5568; }
.preview-value { font-size: 13px; font-weight: 700; }
.preview-value.conservative { color: #3182ce; }
.preview-value.base { color: #1e3a5f; }
.preview-value.aggressive { color: #e53e3e; }
.cagr-display { background: #e6f0ff; border-radius: 6px; padding: 6px 10px; margin-top: 8px; font-size: 12px; color: #1e3a5f; }
.child-items { margin-top: 12px; padding-top: 12px; border-top: 1px dashed #e2e8f0; }
.child-item { background: #f7fafc; border-radius: 8px; padding: 12px; margin-bottom: 8px; border-left: 3px solid #ccc; position: relative; }
.child-delete { position: absolute; top: 8px; right: 8px; background: #fed7d7; color: #c53030; border: none; border-radius: 4px; padding: 2px 8px; font-size: 11px; cursor: pointer; }
.add-child-btn { font-size: 12px; color: #718096; cursor: pointer; border: 1px dashed #cbd5e0; border-radius: 6px; padding: 6px 12px; text-align: center; margin-top: 8px; background: none; width: 100%; }
.add-child-btn:hover { background: #f7fafc; }
.delete-btn { background: #fed7d7; color: #c53030; border: none; border-radius: 6px; padding: 4px 10px; font-size: 12px; cursor: pointer; }
.launch-setting { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
.launch-setting label { font-size: 11px; color: #718096; white-space: nowrap; }
.launch-setting select { border: 1px solid #e2e8f0; border-radius: 6px; padding: 4px 8px; font-size: 12px; }
.bm-section { background: #f0f4f8; border-radius: 8px; padding: 10px; margin-bottom: 10px; }
.bm-title { font-size: 11px; color: #718096; font-weight: 600; margin-bottom: 6px; }
.summary-card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.summary-title { font-size: 15px; font-weight: 700; color: #1e3a5f; margin-bottom: 16px; }
.kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
.kpi-card { background: #f7fafc; border-radius: 8px; padding: 12px; text-align: center; }
.kpi-label { font-size: 11px; color: #718096; margin-bottom: 4px; }
.kpi-value { font-size: 22px; font-weight: 800; color: #1e3a5f; }
.kpi-unit { font-size: 12px; color: #718096; }
.chart-container { width: 100%; overflow-x: auto; }
canvas { max-width: 100%; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { background: #1e3a5f; color: white; padding: 8px 12px; text-align: center; }
td { padding: 7px 12px; border-bottom: 1px solid #e2e8f0; text-align: center; }
tr.cat-total td { background: #e6f0ff; font-weight: 700; }
tr.grand-total td { background: #1e3a5f; color: white; font-weight: 700; }
tr.child-row td { background: #f7fafc; color: #718096; font-size: 12px; }
td:first-child { text-align: left; }
.scenario-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
.scenario-tab { padding: 6px 16px; border-radius: 20px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; }
.scenario-tab.active { background: #1e3a5f; color: white; }
.scenario-tab:not(.active) { background: #e2e8f0; color: #4a5568; }
.notion-output { background: #f7fafc; border-radius: 8px; padding: 16px; font-family: monospace; font-size: 13px; white-space: pre-wrap; line-height: 1.6; }
.drag-handle { color: #cbd5e0; margin-right: 8px; cursor: grab; font-size: 16px; }
.hidden { display: none; }
.toggle-children-btn { font-size: 12px; color: #718096; cursor: pointer; text-decoration: underline; background: none; border: none; padding: 4px 0; }
.parent-mode-select { border: 1px solid #cbd5e0; border-radius: 6px; padding: 3px 8px; font-size: 12px; color: #4a5568; background: #f7fafc; }
.unallocated-box { background: #f0fff4; border-radius: 6px; padding: 8px 12px; margin-top: 8px; font-size: 12px; color: #276749; }
.unallocated-box.over { background: #fff5f5; color: #c53030; }
.disabled-overlay { opacity: 0.4; pointer-events: none; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>🏆 TENTIAL PoTENTIAL1000 ポートフォリオ シミュレーター</h1>
    <p>Sports / Work カテゴリ 売上積み上げシミュレーション</p>
  </div>
  <div style="text-align:right;">
    <button class="copy-url-btn" onclick="copyURL()">🔗 URLをコピー</button>
    <div class="save-indicator" id="saveIndicator"></div>
  </div>
</div>

<div class="global-settings">
  <div>
    <label>📅 開始年月：</label>
    <select id="startYear" onchange="updatePeriod()">
      <option value="2024">2024年</option>
      <option value="2025" selected>2025年</option>
      <option value="2026">2026年</option>
    </select>
    <select id="startMonth" onchange="updatePeriod()">
      <option value="1">1月</option><option value="2">2月</option><option value="3">3月</option>
      <option value="4">4月</option><option value="5">5月</option><option value="6">6月</option>
      <option value="7">7月</option><option value="8">8月</option><option value="9" selected>9月</option>
      <option value="10">10月</option><option value="11">11月</option><option value="12">12月</option>
    </select>
  </div>
  <div>
    <label>📅 終了年月：</label>
    <select id="endYear" onchange="updatePeriod()">
      <option value="2028">2028年</option>
      <option value="2029">2029年</option>
      <option value="2030" selected>2030年</option>
      <option value="2031">2031年</option>
    </select>
    <select id="endMonth" onchange="updatePeriod()">
      <option value="1">1月</option><option value="2">2月</option><option value="3">3月</option>
      <option value="4">4月</option><option value="5">5月</option><option value="6">6月</option>
      <option value="7">7月</option><option value="8" selected>8月</option><option value="9">9月</option>
      <option value="10">10月</option><option value="11">11月</option><option value="12">12月</option>
    </select>
  </div>
  <div>
    <label>小数点以下：</label>
    <select id="decimalPlaces" onchange="render()">
      <option value="0">0桁（整数）</option>
      <option value="1" selected>1桁</option>
      <option value="2">2桁</option>
      <option value="3">3桁</option>
    </select>
  </div>
  <div>
    <label>表示シナリオ：</label>
    <select id="globalScenario" onchange="render()">
      <option value="base">基準</option>
      <option value="conservative">保守</option>
      <option value="aggressive">強気</option>
    </select>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('sports')">⚽ Sports</div>
  <div class="tab" onclick="switchTab('work')">💼 Work</div>
  <div class="tab" onclick="switchTab('summary')">📊 サマリ</div>
  <div class="tab" onclick="switchTab('notion')">📋 Notion出力</div>
</div>

<div class="content">
  <div id="tab-sports">
    <div class="section-header">
      <div class="section-title">⚽ Sports カテゴリ</div>
      <button class="btn btn-primary btn-small" onclick="addProduct('sports')">＋ プロダクト追加</button>
    </div>
    <div id="sports-products"></div>
  </div>

  <div id="tab-work" class="hidden">
    <div class="section-header">
      <div class="section-title">💼 Work カテゴリ</div>
      <button class="btn btn-primary btn-small" onclick="addProduct('work')">＋ プロダクト追加</button>
    </div>
    <div id="work-products"></div>
  </div>

  <div id="tab-summary" class="hidden">
    <div class="summary-card">
      <div class="summary-title">🎯 2030年 全体合計</div>
      <div class="kpi-grid">
        <div class="kpi-card">
          <div class="kpi-label">保守シナリオ</div>
          <div class="kpi-value" id="total-conservative">-</div>
          <div class="kpi-unit">億円</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">基準シナリオ</div>
          <div class="kpi-value" id="total-base">-</div>
          <div class="kpi-unit">億円</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">強気シナリオ</div>
          <div class="kpi-value" id="total-aggressive">-</div>
          <div class="kpi-unit">億円</div>
        </div>
      </div>
    </div>
    <div class="summary-card">
      <div class="summary-title">📈 年次推移（積み上げグラフ）</div>
      <div class="scenario-tabs">
        <button class="scenario-tab active" onclick="switchScenario('base', this)">基準</button>
        <button class="scenario-tab" onclick="switchScenario('conservative', this)">保守</button>
        <button class="scenario-tab" onclick="switchScenario('aggressive', this)">強気</button>
      </div>
      <div class="chart-container">
        <canvas id="mainChart" height="300"></canvas>
      </div>
    </div>
    <div class="summary-card">
      <div class="summary-title">📋 内訳テーブル（億円）</div>
      <button class="toggle-children-btn" onclick="toggleChildrenInTable()">内訳を表示/非表示</button>
      <div style="overflow-x:auto; margin-top:12px;">
        <table id="summaryTable"></table>
      </div>
    </div>
  </div>

  <div id="tab-notion" class="hidden">
    <div class="summary-card">
      <div class="summary-title">📋 部長共有用テキスト</div>
      <div class="notion-output" id="notionOutput"></div>
      <button class="btn btn-primary" style="margin-top:12px;" onclick="copyNotion()">コピー</button>
    </div>
  </div>
</div>

// ===== URL保存・復元 =====
function saveToURL() {
  try {
    const json = JSON.stringify(state);
    const compressed = LZString.compressToEncodedURIComponent(json);
    history.replaceState(null, '', '#' + compressed);
    document.getElementById('saveIndicator').textContent = '✅ URLに保存済み';
    setTimeout(() => { document.getElementById('saveIndicator').textContent = ''; }, 2000);
  } catch(e) { console.error('save error', e); }
}

function loadFromURL() {
  const hash = location.hash.slice(1);
  if (!hash) return false;
  try {
    const json = LZString.decompressFromEncodedURIComponent(hash);
    if (!json) return false;
    const loaded = JSON.parse(json);
    Object.assign(state, loaded);
    // 同期
    if (state.period) {
      const sy = document.getElementById('startYear');
      const sm = document.getElementById('startMonth');
      const ey = document.getElementById('endYear');
      const em = document.getElementById('endMonth');
      if(sy) sy.value = state.period.startYear;
      if(sm) sm.value = state.period.startMonth;
      if(ey) ey.value = state.period.endYear;
      if(em) em.value = state.period.endMonth;
    }
    return true;
  } catch(e) { console.error('load error', e); return false; }
}

function copyURL() {
  saveToURL();
  navigator.clipboard.writeText(location.href).then(() => {
    document.getElementById('saveIndicator').textContent = '📋 コピーしました！';
    setTimeout(() => { document.getElementById('saveIndicator').textContent = ''; }, 2000);
  });
}

function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveToURL, 300);
}

// ===== HELPERS =====
function fmt(v) {
  if (v === null || v === undefined || isNaN(v)) return '-';
  const d = parseInt(document.getElementById('decimalPlaces')?.value ?? state.decimalPlaces);
  return Number(v).toFixed(d);
}

function getFiscalYears() {
  const years = [];
  for (let y = state.period.startYear; y <= state.period.endYear; y++) years.push(y);
  return years;
}

function getFiscalYearLabel(y) { return `${y}/08`; }

function calcTarget(p, scenario) {
  const mid = parseFloat(p.bmMid) || 0;
  const min = parseFloat(p.bmMin) || mid;
  const max = parseFloat(p.bmMax) || mid;
  const baseRate = (p.baseRate || 100) / 100;
  const consRate = ((p.baseRate || 100) + (p.conservativeOffset || -10)) / 100;
  const aggRate = ((p.baseRate || 100) + (p.aggressiveOffset || 10)) / 100;
  if (!mid && !min && !max) return 0;
  if (scenario === 'conservative') return min * consRate;
  if (scenario === 'aggressive') return (max || mid) * aggRate;
  return mid * baseRate;
}

function calcParentTarget(p, scenario) {
  if (p.parentMode === 'children') {
    return (p.children || []).reduce((sum, c) => sum + (calcTarget(c, scenario) || 0), 0);
  }
  return calcTarget(p, scenario);
}

function calcSalesForYear(p, fiscalYear, scenario, isChild) {
  const launchYear = p.launchYear || state.period.startYear;
  if (fiscalYear < launchYear) return null;
  const target = isChild ? calcTarget(p, scenario) : calcParentTarget(p, scenario);
  if (!target) return 0;
  const endYear = state.period.endYear;
  const yearsToEnd = endYear - launchYear;
  if (yearsToEnd <= 0) return target;
  const yearsFromLaunch = fiscalYear - launchYear;
  if (p.isNew || p.parentMode === 'children') {
    const growthRate = (parseFloat(p.growthRate) || 0) / 100;
    const startSales = target / Math.pow(1 + growthRate, yearsToEnd);
    return startSales * Math.pow(1 + growthRate, yearsFromLaunch);
  } else {
    const startSales = parseFloat(p.startSales) || 0;
    if (!startSales || yearsToEnd === 0) return target;
    const cagr = Math.pow(target / startSales, 1 / yearsToEnd) - 1;
    return startSales * Math.pow(1 + cagr, yearsFromLaunch);
  }
}

// ===== UPDATE FUNCTIONS =====
function updateField(cat, i, field, val) {
  state[cat][i][field] = val;
  render(); scheduleSave();
}
function updateBM(cat, i, field, val) {
  state[cat][i][field] = parseFloat(val) || '';
  const p = state[cat][i];
  if (p.bmMin && p.bmMax && field !== 'bmMid') p.bmMid = (parseFloat(p.bmMin) + parseFloat(p.bmMax)) / 2;
  render(); scheduleSave();
}
function updateBaseRate(cat, i, val) {
  state[cat][i].baseRate = parseFloat(val) || 100;
  render(); scheduleSave();
}
function updateScenarioRate(cat, i, type, val) {
  const newRate = parseFloat(val) || 0;
  const p = state[cat][i];
  if (type === 'conservative') p.conservativeOffset = newRate - (p.baseRate || 100);
  else p.aggressiveOffset = newRate - (p.baseRate || 100);
  render(); scheduleSave();
}
function updateChildField(cat, pi, cid, field, val) {
  const ci = state[cat][pi].children.findIndex(c => c.id === cid);
  if (ci >= 0) { state[cat][pi].children[ci][field] = val; render(); scheduleSave(); }
}
function updateChildBM(cat, pi, cid, field, val) {
  const ci = state[cat][pi].children.findIndex(c => c.id === cid);
  if (ci >= 0) {
    state[cat][pi].children[ci][field] = parseFloat(val) || '';
    const c = state[cat][pi].children[ci];
    if (c.bmMin && c.bmMax && field !== 'bmMid') c.bmMid = (parseFloat(c.bmMin) + parseFloat(c.bmMax)) / 2;
    render(); scheduleSave();
  }
}
function updateChildBase(cat, pi, cid, val) {
  const ci = state[cat][pi].children.findIndex(c => c.id === cid);
  if (ci >= 0) { state[cat][pi].children[ci].baseRate = parseFloat(val)||100; render(); scheduleSave(); }
}
function updateChildScenario(cat, pi, cid, type, val) {
  const ci = state[cat][pi].children.findIndex(c => c.id === cid);
  if (ci >= 0) {
    const newRate = parseFloat(val)||0;
    const c = state[cat][pi].children[ci];
    if (type === 'conservative') c.conservativeOffset = newRate - (c.baseRate||100);
    else c.aggressiveOffset = newRate - (c.baseRate||100);
    render(); scheduleSave();
  }
}
function toggleMode(cat, i) { state[cat][i].isNew = !state[cat][i].isNew; render(); scheduleSave(); }
function toggleChildMode(cat, pi, cid) {
  const ci = state[cat][pi].children.findIndex(c => c.id === cid);
  if (ci >= 0) { state[cat][pi].children[ci].isNew = !state[cat][pi].children[ci].isNew; render(); scheduleSave(); }
}
function addProduct(cat) {
  const colors = cat === 'sports'
    ? ['#1E40AF','#3B82F6','#60A5FA','#93C5FD','#BFDBFE','#DBEAFE']
    : ['#065F46','#059669','#34D399','#6EE7B7','#A7F3D0','#D1FAE5'];
  const id = `${cat[0]}${Date.now()}`;
  state[cat].push({ id, name: '新規プロダクト', color: colors[state[cat].length % colors.length], isNew: true, parentMode: 'own', launchYear: state.period.startYear, launchMonth: 9, bmMin: '', bmMid: '', bmMax: '', bmName: '', refCompanies: '', conservativeOffset: -10, baseRate: 100, aggressiveOffset: 10, startSales: 0, growthRate: 100, children: [] });
  render(); scheduleSave();
}
function deleteProduct(cat, i) {
  if (confirm('削除しますか？')) { state[cat].splice(i, 1); render(); scheduleSave(); }
}
function addChild(cat, pi) {
  const id = `c${Date.now()}`;
  if (!state[cat][pi].children) state[cat][pi].children = [];
  state[cat][pi].children.push({ id, name: '子アイテム', isNew: true, launchYear: state[cat][pi].launchYear, launchMonth: state[cat][pi].launchMonth, bmMin: '', bmMid: '', bmMax: '', bmName: '', conservativeOffset: -10, baseRate: 100, aggressiveOffset: 10, startSales: 0, growthRate: 100 });
  render(); scheduleSave();
}
window.deleteChild = function(cat, pi, cid) {
  state[cat][pi].children = state[cat][pi].children.filter(c => c.id !== cid);
  render(); scheduleSave();
};

// ===== DRAG & DROP =====
function dragStart(e, cat, i) { dragSrc = { cat, i }; e.dataTransfer.effectAllowed = 'move'; }
function dragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }
function dragDrop(e, cat, i) {
  e.preventDefault();
  if (!dragSrc || dragSrc.cat !== cat || dragSrc.i === i) return;
  const tmp = state[cat][dragSrc.i];
  state[cat].splice(dragSrc.i, 1);
  state[cat].splice(i, 0, tmp);
  dragSrc = null;
  render(); scheduleSave();
}

// ===== PERIOD =====
function updatePeriod() {
  state.period.startYear = parseInt(document.getElementById('startYear').value);
  state.period.startMonth = parseInt(document.getElementById('startMonth').value);
  state.period.endYear = parseInt(document.getElementById('endYear').value);
  state.period.endMonth = parseInt(document.getElementById('endMonth').value);
  render(); scheduleSave();
}

// ===== TAB =====
function switchTab(tab) {
  ['sports','work','summary','notion'].forEach(t => {
    document.getElementById(`tab-${t}`).classList.toggle('hidden', t !== tab);
  });
  document.querySelectorAll('.tab').forEach((el, i) => {
    el.classList.toggle('active', ['sports','work','summary','notion'][i] === tab);
  });
  if (tab === 'summary') renderSummary();
  if (tab === 'notion') renderNotion();
}

function switchScenario(scenario, btn) {
  state.currentScenario = scenario;
  document.querySelectorAll('.scenario-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderSummary();
}

function toggleChildrenInTable() { state.showChildren = !state.showChildren; renderSummary(); }

// ===== SUMMARY =====
function renderSummary() {
  const years = getFiscalYears();
  const scenario = state.currentScenario;

  document.getElementById('total-conservative').textContent = fmt(state.sports.concat(state.work).reduce((s,p)=>s+(calcParentTarget(p,'conservative')||0),0));
  document.getElementById('total-base').textContent = fmt(state.sports.concat(state.work).reduce((s,p)=>s+(calcParentTarget(p,'base')||0),0));
  document.getElementById('total-aggressive').textContent = fmt(state.sports.concat(state.work).reduce((s,p)=>s+(calcParentTarget(p,'aggressive')||0),0));

  const ctx = document.getElementById('mainChart').getContext('2d');
  if (chart) chart.destroy();
  const sportColors = ['#1E40AF','#3B82F6','#60A5FA','#93C5FD','#BFDBFE','#DBEAFE'];
  const workColors = ['#065F46','#059669','#34D399','#6EE7B7','#A7F3D0','#D1FAE5'];

  const datasets = [
    ...state.sports.map((p, i) => ({
      label: p.name,
      data: years.map(y => { const v = calcSalesForYear(p, y, scenario, false); return v !== null ? v : 0; }),
      backgroundColor: p.color || sportColors[i % sportColors.length],
      stack: 'stack'
    })),
    ...state.work.map((p, i) => ({
      label: p.name,
      data: years.map(y => { const v = calcSalesForYear(p, y, scenario, false); return v !== null ? v : 0; }),
      backgroundColor: p.color || workColors[i % workColors.length],
      stack: 'stack'
    }))
  ];

  chart = new Chart(ctx, {
    type: 'bar',
    data: { labels: years.map(getFiscalYearLabel), datasets },
    options: {
      responsive: true,
      plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 11 } } } },
      scales: {
        x: { stacked: true },
        y: { stacked: true, title: { display: true, text: '億円' } }
      }
    }
  });

  const table = document.getElementById('summaryTable');
  const thead = `<thead><tr><th>プロダクト</th>${years.map(y=>`<th>${getFiscalYearLabel(y)}</th>`).join('')}</tr></thead>`;
  let tbody = '<tbody>';

  ['sports','work'].forEach(cat => {
    const label = cat === 'sports' ? '⚽ Sports 合計' : '💼 Work 合計';
    tbody += `<tr class="cat-total"><td>${label}</td>${years.map(y => {
      const total = state[cat].reduce((sum, p) => { const v = calcSalesForYear(p, y, scenario, false); return sum + (v||0); }, 0);
      return `<td>${fmt(total)}</td>`;
    }).join('')}</tr>`;
    state[cat].forEach(p => {
      tbody += `<tr><td style="padding-left:16px">▸ ${p.name}${p.parentMode==='children'?' (子合計)':p.parentMode==='subset'?' (部分集合)':''}</td>${years.map(y => {
        const v = calcSalesForYear(p, y, scenario, false);
        return `<td>${v !== null ? fmt(v) : '−'}</td>`;
      }).join('')}</tr>`;
      if (state.showChildren && p.children) {
        p.children.forEach(c => {
          tbody += `<tr class="child-row"><td style="padding-left:32px">└ ${c.name}</td>${years.map(y => {
            const v = calcSalesForYear(c, y, scenario, true);
            return `<td>${v !== null ? fmt(v) : '−'}</td>`;
          }).join('')}</tr>`;
        });
      }
    });
  });

  tbody += `<tr class="grand-total"><td>🎯 全体合計</td>${years.map(y => {
    const total = [...state.sports, ...state.work].reduce((sum, p) => { const v = calcSalesForYear(p, y, scenario, false); return sum + (v||0); }, 0);
    return `<td>${fmt(total)}</td>`;
  }).join('')}</tr>`;
  tbody += '</tbody>';
  table.innerHTML = thead + tbody;
}

// ===== NOTION =====
function renderNotion() {
  let text = `■ PoTENTIAL1000 ポートフォリオ試算\n期間: ${state.period.startYear}年${state.period.startMonth}月〜${state.period.endYear}年${state.period.endMonth}月\n\n`;
  ['sports','work'].forEach(cat => {
    text += `【${cat === 'sports' ? 'Sports' : 'Work'} カテゴリ】\n`;
    state[cat].forEach(p => {
      const base = calcParentTarget(p, 'base');
      const cons = calcParentTarget(p, 'conservative');
      const agg = calcParentTarget(p, 'aggressive');
      text += `・${p.name}\n`;
      if (p.bmName) text += `  BM: ${p.bmName}（中央値${p.bmMid||'-'}億円）\n`;
      text += `  2030年目標: 保守${fmt(cons)}億 / 基準${fmt(base)}億 / 強気${fmt(agg)}億\n`;
      if (p.children && p.children.length > 0) {
        p.children.forEach(c => {
          text += `  └ ${c.name}: 基準${fmt(calcTarget(c,'base'))}億\n`;
        });
      }
    });
    const total = state[cat].reduce((s,p)=>s+(calcParentTarget(p,'base')||0),0);
    text += `  → ${cat==='sports'?'Sports':'Work'} 合計（基準）: ${fmt(total)}億円\n\n`;
  });
  const grand = [...state.sports,...state.work].reduce((s,p)=>s+(calcParentTarget(p,'base')||0),0);
  text += `【全体合計（基準）】${fmt(grand)}億円\n`;
  document.getElementById('notionOutput').textContent = text;
}

function copyNotion() {
  navigator.clipboard.writeText(document.getElementById('notionOutput').textContent);
  alert('コピーしました！');
}

// ===== MAIN RENDER =====
function render() {
  renderProducts('sports');
  renderProducts('work');
  const activeTab = document.querySelector('.tab.active')?.textContent;
  if (activeTab?.includes('サマリ')) renderSummary();
  if (activeTab?.includes('Notion')) renderNotion();
}

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') e.stopPropagation();
});

// ===== INIT =====
const restored = loadFromURL();
render();
if (restored) {
  document.getElementById('saveIndicator').textContent = '✅ データを復元しました';
  setTimeout(() => { document.getElementById('saveIndicator').textContent = ''; }, 3000);
}
</script>
